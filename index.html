<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>100_btc_v2 Matrix Dashboard (from 2011)</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; background: #f8fafc; color: #0f172a; }
  .page { max-width: 1300px; margin: 0 auto; padding: 20px; }
  .logout-btn {
    position: fixed; top: 16px; right: 20px; z-index: 999;
    background: #141414; color: #f0f0f0; border: 1px solid #242424;
    border-radius: 8px; padding: 8px 16px; font-size: 0.85rem; font-weight: 600;
    cursor: pointer; text-decoration: none; transition: background 0.15s;
  }
  .logout-btn:hover { background: #f7931a; color: #000; border-color: #f7931a; }
  h1 { font-size: 24px; margin: 0 0 8px 0; }
  .subtitle { color: #475569; margin-bottom: 20px; font-size: 14px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab { padding: 10px 20px; border: 1px solid #cbd5e1; border-radius: 8px; cursor: pointer;
          background: white; font-size: 14px; font-weight: 500; }
  .tab.active { background: #0f172a; color: white; border-color: #0f172a; }
  .panel { display: none; }
  .panel.active { display: block; }
  iframe { width: 100%; height: 920px; border: 1px solid #e2e8f0; border-radius: 8px; }
</style>
</head>
<body>
<a class="logout-btn" href="/__logout">Log out →</a>
<div class="page">
  <h1>100_btc_v2 Bot vs 100% BTC HODL — Full Matrix Analysis (from 2011)</h1>
  <div class="subtitle">
    Return: Bot wins 86.5% (>3%) | Neutral 9.8% | HODL wins 3.7% &nbsp;|&nbsp;
    Sharpe: Bot better 95.0% &nbsp;|&nbsp;
    Sortino: Bot better 88.6%
  </div>
  <div class="tabs">
    <div class="tab active" onclick="show(0)">Return (3-Level)</div>
    <div class="tab" onclick="show(1)">Sharpe (3-Level)</div>
    <div class="tab" onclick="show(2)">Sortino (3-Level)</div>
  </div>
  <div id="p0" class="panel active"><iframe src="bot_vs_hodl_interactive_from2011.html"></iframe></div>
  <div id="p1" class="panel"><iframe src="bot_vs_hodl_sharpe_gradient_from2011.html"></iframe></div>
  <div id="p2" class="panel"><iframe src="bot_vs_hodl_sortino_gradient_from2011.html"></iframe></div>
</div>
<script>
function show(idx) {
  document.querySelectorAll('.panel').forEach((p,i) => p.classList.toggle('active', i===idx));
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
}
</script>
</body>
</html>
